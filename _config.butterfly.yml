# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/posts/21cfbf15/

# ---------- Site Verification ----------
# google_site_verification:
# bing_site_verification:
# baidu_site_verification:

# ---------- Navigation ----------
nav:
  logo: # 导航栏Logo文字（留空用标题）
  display_title: true
  fixed: true # 导航栏固定顶部

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  笔记: /notes/ || fas fa-book
  关于: /about/ || fas fa-heart

# ---------- Code Highlight ----------
highlight_theme: mac # darker / pale night / light / ocean / mac / mac light
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: 350

code_word_wrap: false

# ---------- Social Icons ----------
social:
  fab fa-github: https://github.com/Elohim000 || GitHub
  fas fa-envelope: mailto:1933463088@qq.com || Email

# ---------- Avatar ----------
avatar:
  img: /img/touxiang.jpg
  effect: true # 旋转特效

# ---------- Disable Footer Banner ----------
disable_top_img: false

# ---------- Index Page ----------
index_top_img: /img/bejing1.jpg
index_top_img_height: 100vh
index_site_info_top: Elohim的小屋

# ---------- Top Image for Pages ----------
default_top_img: /img/bejing1.jpg

# ---------- Post Settings ----------
post_meta:
  page:
    date_type: both # created / updated / both
    date_format: date # date / relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Post QR Code
qrcode:
  enable: false

# Post Edit link
post_edit:
  enable: false

# Post navigation (prev/next)
post_pagination: 2 # 1: left/right, 2: top/bottom

# ---------- TOC (Table of Contents) ----------
toc:
  post: true
  page: true
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# ---------- Sponsor ----------
sponsor:
  enable: false

# ---------- Footer ----------
footer:
  owner:
    enable: true
    since: 2026
  custom_text: 学无止境，日拱一卒。
  copyright: true

# ---------- Sidebar ----------
sidebar:
  position: right # left / right
  display: post # post / always / hide / remove
  padding: 18px
  offset: 12px

# ---------- Widgets (小组件) ----------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 终身学习者 / 编程爱好者
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/Elohim000
  card_announcement:
    enable: true
    content: 欢迎来到我的个人网站，这里记录了我无聊的大三生活
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    expand: false
    sort_order: name
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
  card_post_series:
    enable: false

# ---------- Clock Widget ----------
clock:
  enable: true
  animal: true
  showText: true

# ---------- Local Search ----------
local_search:
  enable: true
  preload: false
  top_n_per_article: 1
  unescape: false
  CDN:

# ---------- Beautify (花哨特效) ----------
# Loading animation
preloader:
  enable: true
  source: 1 # 1: pace.js progress bar, 2: loading screen with % counter

# Background effects
canvas_ribbon:
  enable: true
  size: 100
  alpha: 0.6
  zIndex: -1
  click_to_change: false

# Subtitle typewriter effect — disabled in favor of custom inject
subtitle:
  enable: true
  effect: false
  typed_option:

# ---------- Dark Mode ----------
darkmode:
  enable: false
  button: false
  autoChangeMode: false

# ---------- Lightbox (图片灯箱) ----------
fancybox: true

# ---------- Pjax (无刷新加载) ----------
pjax:
  enable: false

# ---------- Snackbar (右下角通知) ----------
snackbar:
  enable: true
  position: bottom-right
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# ---------- Other Plugins ----------
# Word count / Reading time
wordcount:
  enable: true
  post_wordcount: true
  min2read: true

# ---------- Inject custom CSS/JS ----------
inject:
  head:
    - '<script src="/js/typed.umd.js"></script>'
    - |
      <style>
      #page-header #site-info {
        top: 50% !important;
        transform: translateY(-50%);
      }
      </style>
  bottom:
    - |
      <script>
      document.addEventListener('DOMContentLoaded', function() {
        var el = document.getElementById('subtitle');
        if (!el || typeof Typed === 'undefined') return;
        new Typed('#subtitle', {
          strings: ['即使没有太阳，我的心中依旧天光乍现。', '卷，都卷，卷点好啊/(ㄒoㄒ)/~~'],
          typeSpeed: 120,
          backSpeed: 80,
          startDelay: 500,
          backDelay: 3000,
          loop: true,
          showCursor: true,
          cursorChar: '|'
        });
      });
      </script>

# ---------- CDN ----------
# Use local files instead of CDN (more reliable in China)
CDN:
  option: local
